<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
  <div *ngFor="let toast of toastService.toasts()" 
       class="animate-fade-in flex items-center p-4 w-full max-w-xs rounded-xl shadow-lg shadow-black/30 border backdrop-blur-md"
       [ngClass]="{
         'bg-green-500/10 border-green-500/20 text-green-400': toast.type === 'success',
         'bg-red-500/10 border-red-500/20 text-red-400': toast.type === 'error',
         'bg-blue-500/10 border-blue-500/20 text-blue-400': toast.type === 'info'
       }">
    <div class="inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg"
         [ngClass]="{
           'bg-green-500/20': toast.type === 'success',
           'bg-red-500/20': toast.type === 'error',
           'bg-blue-500/20': toast.type === 'info'
         }">
      <i class="fas" [ngClass]="{
        'fa-check': toast.type === 'success',
        'fa-exclamation-triangle': toast.type === 'error',
        'fa-info-circle': toast.type === 'info'
      }"></i>
    </div>
    <div class="ml-3 text-sm font-medium">{{toast.message}}</div>
    <button type="button" class="ml-auto -mx-1.5 -my-1.5 rounded-lg focus:ring-2 p-1.5 inline-flex h-8 w-8 text-gray-400 hover:text-white transition-colors" (click)="toastService.remove(toast.id)">
      <span class="sr-only">Close</span>
      <i class="fas fa-times"></i>
    </button>
  </div>
</div>
