<div class="flex h-screen bg-dark-900 text-white font-sans selection:bg-primary-500/30 overflow-hidden">

  <!-- Sidebar Navigation -->
  <aside
    class="w-64 border-r border-dark-700 bg-dark-800/80 backdrop-blur-md flex flex-col hidden md:flex shrink-0 shadow-2xl z-20">
    <div class="h-16 flex items-center px-6 border-b border-dark-700/50">
      <div
        class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center shadow-lg shadow-primary-500/30 mr-3">
        <i class="fas fa-layer-group text-white text-sm"></i>
      </div>
      <h1
        class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-100 to-gray-400">
        PMP Enterprise</h1>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <p class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-2">Menu</p>
      <a routerLink="/" routerLinkActive="bg-primary-500/10 text-primary-400 border-primary-500/20 shadow-sm"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-dark-700/50 rounded-xl transition-all border border-transparent font-medium group">
        <i class="fas fa-home w-5 text-center group-hover:scale-110 transition-transform"></i> Dashboard
      </a>
      <a routerLink="/prompts" routerLinkActive="bg-primary-500/10 text-primary-400 border-primary-500/20 shadow-sm"
        [routerLinkActiveOptions]="{exact: false}"
        class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-dark-700/50 rounded-xl transition-all border border-transparent font-medium group">
        <i class="fas fa-comments w-5 text-center group-hover:scale-110 transition-transform"></i> Prompts
      </a>
      <a
        class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-dark-700/50 rounded-xl transition-all border border-transparent font-medium group opacity-50 cursor-not-allowed">
        <i class="fas fa-flask w-5 text-center group-hover:scale-110 transition-transform"></i> Playground
      </a>
      <a
        class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-dark-700/50 rounded-xl transition-all border border-transparent font-medium group opacity-50 cursor-not-allowed">
        <i class="fas fa-chart-line w-5 text-center group-hover:scale-110 transition-transform"></i> Analytics
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col h-screen min-w-0 bg-[#0a0f18] relative">
    <!-- Top Header/Navbar -->
    <header
      class="h-16 flex items-center justify-between px-6 border-b border-dark-700/50 bg-dark-900/95 backdrop-blur-md z-10 shrink-0 sticky top-0">
      <div class="flex items-center gap-4">
        <button
          class="md:hidden text-gray-400 hover:text-white transition-colors w-10 h-10 flex items-center justify-center rounded-lg hover:bg-dark-800"><i
            class="fas fa-bars"></i></button>
        <h2 class="font-semibold text-lg text-gray-100 hidden sm:block">Prompts Workspace</h2>
      </div>
      <div class="flex items-center gap-4">
        <button
          class="text-gray-400 hover:text-white transition-colors w-9 h-9 flex items-center justify-center rounded-full hover:bg-dark-800 relative">
          <i class="fas fa-bell"></i>
          <span class="absolute top-2 right-2.5 w-2 h-2 bg-primary-500 rounded-full border-2 border-dark-900"></span>
        </button>
        <div
          class="w-8 h-8 rounded-full bg-dark-700 border border-dark-600 flex items-center justify-center overflow-hidden cursor-pointer hover:ring-2 ring-primary-500/50 transition-all shadow-md">
          <img src="https://ui-avatars.com/api/?name=Admin&background=1e293b&color=fff" alt="User" />
        </div>
      </div>
    </header>

    <!-- Dynamic View -->
    <main class="flex-1 overflow-y-auto w-full p-4 lg:p-8">
      <div class="max-w-7xl mx-auto h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>

<app-toast></app-toast>
